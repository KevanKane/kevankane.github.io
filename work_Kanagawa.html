<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/Style.css"> <!-- MainSite & Header -->
  <link rel="stylesheet" href="CSS/ProjectStyle.css"> <!-- Project -->

  <title>Satu Asistensi Lagi - KevanKane</title>
  <link rel="shortcut icon" href="Images/Logo.ico" media="(prefers-color-scheme: dark)">
  <link rel="shortcut icon" href="Images/LogoLight.ico" media="(prefers-color-scheme: light)">
</head>
<body> 
  <a class="BackButton" data-href="work.html">
    Back to Work
    <img src="Images/Open.png"></img>
  </a>
  <div id="projectTransition">
    <img src="Images/KevanKaneLogoSingular.png">
    <a>Verdant Sailor</a>
  </div>

  <div class="customscroll">
    <div class="HeaderSection">
      <div class="logoContainer">
        <img src="Images/KevanKaneLogoSingular.png">
        <a class="logoHover">KevKane</a>
      </div>
    </div>
    <div class="Banner" id="banner" style="background-image: url(Images/Kanagawa/Banner.png);"></div>
    <div class="ProjectTitleSection">
      <div class="ProjectTitle" id="headLabel">MP7 - Kanagawa</div>
      <div class="ProjectDate">2022</div>

      <div class="workTags">
        <a class="workTagLabel">CS:GO</a>
        <a class="workTagLabel">Community Skin</a>
        <a class="workTagLabel">3D</a>
      </div>
    </div>

    <div class="ContentContainer">
      <video class="VideoSection" autoplay loop muted src="Images/Kanagawa/video.mp4"></video>
      <div class="ImageSection" style="background-image: url(Images/Kanagawa/SteamPreview1.png);"></div>
      <div class="ImageSection" style="background-image: url(Images/Kanagawa/SteamPreview2.png);"></div>
      <div class="ImageSection" style="background-image: url(Images/Kanagawa/SteamPreview3.png);"></div>
      <div class="ImageSection" style="background-image: url(Images/Kanagawa/SteamPreview4.png);"></div>
      <div class="ImageSection" style="background-image: url(Images/Kanagawa/SteamPreview5.png);"></div>
      <div class="ImageSection" style="background-image: url(Images/Kanagawa/Image.png);"></div>
    </div>

    <div class="projectFooterTitle">
      <div class="projectFooterTitleTitle" id="footerTitle">More Work</div>
    </div>

    <div class="projectMore" id="moreProject">
      <div class="workTemplate" data-type="Verdant Sailor" style="background-image: url(Images/Verdant/Normal.png)">
        <a class="workTemplateCollider"></a>

        <div class="workHover">
          <a class="workTitle">Verdant Sailor</a>
          <img class="workArrow" src="Images/Open.png">
        </div>
      </div>
      
      <div class="workTemplate" data-type="Markers" data-href="work_Markers.html" style="background-image: url(Images/Markers/Image1.png)">
        <a class="workTemplateCollider"></a>

        <div class="workHover">
          <a class="workTitle">Markers</a>
          <img class="workArrow" src="Images/Open.png">
        </div>
      </div>
    </div>

    <div class="projectFooter">
      <a class="FooterTitle" id="footerDesc">devoting my passions into digital’s tapestry</a>
      <div class="backToMenu">
        <a class="menuJump" data-value="Home" data-href="index.html">Home</a>
        <a class="menuJump" data-value="Work" data-href="work.html">Work</a>
        <a class="menuJump" data-value="About" data-href="about.html">About</a>
      </div>
    </div>
  </div>
</body>
  <script src="Scripts/customscroll_project.js"></script>
  <script src="Scripts/letterscramble.js"></script>
  <script src="Scripts/projectopen.js"></script>
</html>
